<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VerifyAI | Neural Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- PRECISE CYBER-GLOW INTERFACE --- */
        :root {
            --bg-black: #020205;
            --card-bg: rgba(13, 13, 20, 0.95);
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --neon-green: #00ff88;
            --neon-red: #ff2a6d;
            --text-white: #ffffff;
            --text-dim: #9494b8;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            background: radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.12) 0%, transparent 40%), #020205;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 80px 20px; }
        header { text-align: center; margin-bottom: 60px; }

        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* Fixed the double span selector mistake */
        .logo span {
            color: var(--accent-cyan);
            text-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 2px solid rgb(12, 158, 255);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 1px 9px 15px 0px rgba(15, 90, 253, 0.801), -1px -9px 15px 0px rgba(76, 0, 255, 0.644);
        }

        /* --- ENHANCED TEXTAREA WITH NEON GLOW --- */
        textarea {
            width: 100%;
            min-height: 200px;
            background: rgba(0, 0, 0, 0.4);
            /* Subtle initial border */
            border: 1px solid rgba(0, 242, 255, 0.2); 
            border-radius: 20px;
            padding: 25px;
            color: #fff;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: all 0.4s ease;
            /* Gentle idle glow */
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        textarea:hover {
            border-color: rgba(0, 242, 255, 0.5);
        }

        textarea:focus {
            background: rgba(0, 0, 0, 0.6);
            /* Electric Cyan Glow when typing */
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2), 
                        inset 0 0 15px rgba(0, 242, 255, 0.1);
            transform: scale(1.005); /* Very slight pop effect */
        }

        /* Custom Scrollbar to match the theme */
        textarea::-webkit-scrollbar {
            width: 8px;
        }

        textarea::-webkit-scrollbar-thumb {
            background: var(--accent-purple);
            border-radius: 10px;
        }

        textarea::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .footer-actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 35px; }

        /* 1. Find the Primary Button section and replace it with this: */
        .primary-btn {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none; 
            padding: 16px 40px; 
            border-radius: 14px; 
            color: #fff;
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); /* Added for smooth animation */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Add this new Hover state right below it */
        .primary-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6), 
                        0 0 40px rgba(112, 0, 255, 0.3);
            letter-spacing: 1px;
        }

        /* 2. Find the Secondary Button section and replace it with this: */
        .secondary-btn {
            background: rgba(255, 42, 109, 0.05); 
            border: 2px solid var(--neon-red);
            color: var(--neon-red); 
            padding: 16px 30px; 
            border-radius: 14px; 
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease; /* Added for smooth animation */
        }

        /* Add this new Hover state right below it */
        .secondary-btn:hover {
            background: rgba(255, 42, 109, 0.15);
            box-shadow: 0 0 15px rgba(255, 42, 109, 0.4), 
                        inset 0 0 10px rgba(255, 42, 109, 0.2);
            transform: translateY(-2px);
        }

        select {
            width: 100%; max-width: 320px; background: rgba(0, 0, 0, 0.7);
            color: var(--accent-cyan); padding: 14px 20px; border-radius: 14px;
            border: 2px solid var(--accent-purple); font-weight: 700; margin-bottom: 20px;
        }

        .hidden { display: none; }

        /* --- STYLISH OUTPUT BOX WITH GLOW --- */
        .result-card {
            margin-top: 40px;
            background: rgba(13, 13, 20, 0.9); /* Deep glass effect */
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Subtle inner pulse for the card */
        .result-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        /* REAL NEWS - Emerald Glow */
        .result-card.real {
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2), 
                        inset 0 0 15px rgba(0, 255, 136, 0.1);
            animation: real-pulse 2s infinite alternate;
        }

        /* FAKE NEWS - Crimson Glow */
        .result-card.fake {
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 25px rgba(255, 42, 109, 0.3), 
                        inset 0 0 15px rgba(255, 42, 109, 0.1);
            animation: fake-pulse 2s infinite alternate;
        }

        /* Animations for the "Breathing" glow effect */
        @keyframes real-pulse {
            from { box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
            to { box-shadow: 0 0 35px rgba(0, 255, 136, 0.5); }
        }

        @keyframes fake-pulse {
            from { box-shadow: 0 0 15px rgba(255, 42, 109, 0.2); }
            to { box-shadow: 0 0 40px rgba(255, 42, 109, 0.6); }
        }

        /* Make the text extra sharp */
        #verdictText {
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .real #verdictText { color: var(--neon-green); text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .fake #verdictText { color: var(--neon-red); text-shadow: 0 0 10px rgba(255, 42, 109, 0.5); }

        .progress-bar-wrap { width: 100%; height: 12px; background: rgba(0, 0, 0, 0.6); border-radius: 50px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); width: 0%; transition: width 1.5s ease; }

        .reasoning-panel { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 25px; margin-top: 30px; border-left: 4px solid var(--accent-purple); }
        .meta-grid { display: flex; justify-content: space-around; margin-top: 20px; }
        .meta-item b { color: var(--accent-cyan); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Verify<span>AI</span></div>
            <p style="color: var(--text-dim);">Final Semester MCA Project | Hybrid Engine</p>
        </header>

        <main>
            <div class="card">
                <select id="engineSelect">
                    <option value="gemini">Google Gemini 2.5 Flash Lite</option>
                    <option value="dl">PyTorch WELFake</option>
                </select>

                <textarea id="newsInput" placeholder="Paste news article content here..."></textarea>
                
                <div class="footer-actions">
                    <button id="clearBtn" class="secondary-btn">Clear</button>
                    <button id="analyzeBtn" class="primary-btn">Initiate Analysis <i class="fas fa-bolt"></i></button>
                </div>
            </div>

            <div id="resultCard" class="result-card hidden">
                <h1 id="verdictText">-</h1>
                <div style="margin: 30px 0;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>Confidence Score</span>
                        <span id="confValue">0%</span>
                    </div>
                    <div class="progress-bar-wrap"><div id="progressFill" class="progress-fill"></div></div>
                </div>
                <div class="reasoning-panel"><p id="reasonText"></p></div>
                <div class="meta-grid">
                    <div class="meta-item"><span>Status: </span><b>Active</b></div>
                    <div class="meta-item"><span>Model: </span><b id="modelText">-</b></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const analyzeBtn = document.getElementById('analyzeBtn');
            const newsInput = document.getElementById('newsInput');
            const resultCard = document.getElementById('resultCard');

            analyzeBtn.addEventListener('click', async () => {
                const text = newsInput.value.trim();
                const engine = document.getElementById('engineSelect').value;
                if (!text) return;

                analyzeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                analyzeBtn.disabled = true;

                try {
                    // FIX: Changed port from 8080 to 5000 to match app.py
                    const response = await fetch('http://127.0.0.1:5000/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, engine })
                    });

                    const data = await response.json();
                    resultCard.classList.remove('hidden', 'real', 'fake');
                    const isFake = data.prediction.toLowerCase().includes('fake');
                    resultCard.classList.add(isFake ? 'fake' : 'real');

                    document.getElementById('verdictText').innerText = data.prediction;
                    document.getElementById('reasonText').innerText = data.reason;
                    document.getElementById('modelText').innerText = data.model_used;

                    const conf = Math.round(data.confidence * 100);
                    document.getElementById('confValue').innerText = conf + '%';
                    const fill = document.getElementById('progressFill');
                    fill.style.width = '0%';
                    setTimeout(() => { fill.style.width = conf + '%'; }, 100);
                    resultCard.scrollIntoView({ behavior: 'smooth' });

                } catch (err) {
                    console.error(err);
                    alert('Connection to local backend failed! Ensure app.py is running.');
                } finally {
                    analyzeBtn.innerHTML = 'Initiate Analysis <i class="fas fa-bolt"></i>';
                    analyzeBtn.disabled = false;
                }
            });

            document.getElementById('clearBtn').addEventListener('click', () => {
                newsInput.value = '';
                resultCard.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
